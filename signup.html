<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충정일보 회원가입</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page auth-page-clean">
        <div class="auth-shell">
            <div class="auth-card auth-card-signup auth-card-mockup">
                <div class="auth-head">
                    <div class="brand-mark-wrap" aria-hidden="true">
                        <span class="brand-mark"></span>
                    </div>
                    <h1 class="brand-title brand-dark">충정일보</h1>
                    <h2 class="page-title auth-main-title">회원가입</h2>
                </div>

                <form id="signupForm" class="auth-form auth-form-tight">
                    <div class="form-group form-group-icon">
                        <label for="user_id" class="sr-only">아이디</label>
                        <span class="field-icon" aria-hidden="true">＠</span>
                        <input type="text" id="user_id" name="user_id" placeholder="사용할 아이디를 입력하세요" required>
                    </div>

                    <div class="form-group form-group-icon">
                        <label for="password" class="sr-only">비밀번호</label>
                        <span class="field-icon" aria-hidden="true">🔒</span>
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                    </div>

                    <div class="form-group form-group-icon">
                        <label for="user_name" class="sr-only">이름</label>
                        <span class="field-icon" aria-hidden="true">👤</span>
                        <input type="text" id="user_name" name="user_name" placeholder="이름을 입력하세요" required>
                    </div>

                    <div class="form-group form-group-icon form-group-select">
                        <label for="role" class="sr-only">권한</label>
                        <span class="field-icon" aria-hidden="true">▣</span>
                        <select id="role" name="role" required>
                            <option value="user">user</option>
                            <option value="admin">admin</option>
                        </select>
                    </div>

                    <button type="submit" class="primary-btn auth-submit-btn">회원가입</button>
                </form>

                <div id="status" class="status-text auth-status"></div>

                <div class="auth-note">
                    회원가입 시 서비스 이용을 위한 기본 계정 정보가 저장됩니다.
                </div>

                <div class="auth-divider"></div>

                <div class="auth-foot auth-foot-stack compact-gap">
                    <span class="auth-foot-text">이미 계정이 있으신가요?</span>
                    <a href="/" class="text-link auth-inline-link">로그인</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');

        signupForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            const status = document.getElementById('status');
            status.textContent = '회원가입 처리 중입니다...';

            const payload = {
                user_id: signupForm.user_id.value.trim(),
                password: signupForm.password.value.trim(),
                user_name: signupForm.user_name.value.trim(),
                role: signupForm.role.value
            };

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                status.textContent = data.message;

                if (response.ok && data.success) {
                    setTimeout(() => {
                        location.href = '/';
                    }, 800);
                }
            } catch (error) {
                console.error(error);
                status.textContent = '회원가입 중 오류가 발생했습니다.';
            }
        });
    </script>
</body>
</html>
