<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충정일보 로그인 실패</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page auth-page-clean">
        <div class="auth-shell">
            <div class="auth-card auth-card-login auth-card-mockup auth-card-fail">
                <div class="auth-head">
                    <div class="brand-mark-wrap" aria-hidden="true">
                        <span class="brand-mark"></span>
                    </div>
                    <h1 class="brand-title brand-dark">충정일보</h1>
                    <h2 class="page-title auth-main-title">로그인 실패</h2>
                    <p class="auth-subtitle fail-subtitle">아이디 또는 비밀번호를 다시 확인해주세요.</p>
                </div>

                <div class="action-column action-column-mockup">
                    <a href="/" class="primary-btn text-button auth-submit-btn">다시 로그인하기</a>
                    <a href="/signup" class="secondary-btn text-button secondary-soft">회원가입 하러 가기</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
